<div class="container">
    
    <h1>Criar Conta</h1>

    <form>

        <label>Nome</label>
        <input type="text" placeholder="Digite seu nome">

        <label>Email</label>
        <input type="email" placeholder="Digite seu email">

        <label>Telefone</label>
        <input type="text" placeholder="(11) 99999-9999">

        <label>Senha</label>
        <input type="password" placeholder="Crie uma senha">

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <p>
        Já possui conta?
